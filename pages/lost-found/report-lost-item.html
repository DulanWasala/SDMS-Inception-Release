<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Lost Item</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script src="../../assets/js/app.js" defer></script>
</head>
<body>

<main class="page center-page">
  <h1 class="page-title">Report Lost Item</h1>

  <div id="lostItemSuccessMessage" class="success-message" style="display:none;"></div>

  <div class="stack">
    <input id="reporterName" class="input-field" type="text" placeholder="Reporter Name" value="John Smith">
    <input id="reporterId" class="input-field" type="text" placeholder="Employee / Temp ID" value="E1023">
    <input id="itemDescription" class="input-field" type="text" placeholder="Item Description">
    
    <select id="lostLocation" class="select-field">
      <option value="">Select Last Known Location</option>
      <option>Warehouse Floor</option>
      <option>Security Desk</option>
      <option>Break Room</option>
      <option>Loading Dock</option>
      <option>Parking Area</option>
    </select>

    <input id="dateLost" class="input-field" type="date">
    
    <textarea
      id="lostNotes"
      class="input-field"
      placeholder="Additional Notes"
      style="min-height: 120px; resize: vertical;"
    ></textarea>

    <button class="btn" onclick="submitLostItemReport()">Submit Report</button>
    <a class="btn-link secondary" href="index.html">Back</a>
  </div>
</main>

<script>
  function submitLostItemReport() {
    const reporterName = document.getElementById("reporterName").value.trim();
    const reporterId = document.getElementById("reporterId").value.trim();
    const itemDescription = document.getElementById("itemDescription").value.trim();
    const lostLocation = document.getElementById("lostLocation").value;
    const dateLost = document.getElementById("dateLost").value;
    const successBox = document.getElementById("lostItemSuccessMessage");

    if (!itemDescription || !lostLocation || !dateLost) {
      alert("Please complete the required fields before submitting.");
      return;
    }

    successBox.style.display = "block";
    successBox.textContent =
      `Lost item report submitted for "${itemDescription}" by ${reporterName} (${reporterId}).`;

    document.getElementById("lostNotes").value = "";
  }
</script>

</body>
</html>
