<!DOCTYPE html>

<head>

  <title>Item Details</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script src="../../assets/js/app.js" defer></script>
</head>
<body>

<main class="page">
  <h1 class="page-title">Lost / Found Item Details</h1>

  <div id="claimSuccessMessage" class="success-message" style="display:none;"></div>

  <div class="info-layout">
    <div>
      <section class="panel">
        <h2>Item Information</h2>
        <div id="lostFoundItemInfo"></div>

      <section class="panel" style="margin-top: 28px;">
        <h2>Claim Information</h2>
        <div id="lostFoundClaimInfo"></div>
      </section>
    </div>

    <div class="right-column">
      <a id="claimItemButton" class="btn-link" href="#" onclick="claimCurrentLostFoundItem(); return false;">Claim Item</a>
      <a class="btn-link secondary" href="#" onclick="alert('Mock UI only for this increment.'); return false;">Update Item Status</a>
      <a class="btn-link secondary" href="search.html">Back to Search</a>
