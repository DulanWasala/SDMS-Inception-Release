<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Lost / Found Items</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script src="../../assets/js/app.js" defer></script>
</head>
<body>

<main class="page">
  <h1 class="page-title">Search Lost / Found Items</h1>

  <div class="filter-row">
    <input class="input-field" type="text" placeholder="Search by item description or item ID" value="Wallet" style="max-width: 340px;">
    
    <select class="select-field" style="width: 180px;">
      <option>All Statuses</option>
      <option>Lost</option>
      <option>Found</option>
      <option>Pending Verification</option>
      <option>Claimed</option>
    </select>

    <a class="btn-link" href="#" onclick="return false;">Search</a>
  </div>

  <div id="lostFoundResults" class="equipment-list"></div>

  <div class="back-row">
    <a class="btn-link secondary" href="index.html">Back</a>
  </div>
</main>

</body>
</html>
